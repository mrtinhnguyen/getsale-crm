    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres_dev}@pgbouncer:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379
      - RABBITMQ_URL=amqp://getsale:getsale_dev@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      - PIPELINE_SERVICE_URL=http://pipeline-service:3008
      - COOKIE_DOMAIN=localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
