# Override secrets in .env for production — see .env.example
services:
  # ==================== Infrastructure ====================
  
  postgres:
    image: postgres:15-alpine
    container_name: getsale-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - getsale-network

  redis:
    image: redis:7-alpine
    container_name: getsale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_dev}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-redis_dev}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - getsale-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: getsale-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: getsale
      RABBITMQ_DEFAULT_PASS: getsale_dev
    ports:
      - "5672:5672"   # AMQP
      # Management UI (15672) not exposed; use `docker exec -it getsale-rabbitmq rabbitmq-diagnostics` or
      # `docker exec -it getsale-rabbitmq rabbitmqctl` when needed
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - getsale-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: getsale-pgbouncer
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_dev}@postgres:5432/postgres
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - getsale-network

  # ==================== Services ====================
  
  api-gateway:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.dev
      args:
        SERVICE_PATH: services/api-gateway
    container_name: getsale-api-gateway
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379
      - RABBITMQ_URL=amqp://getsale:getsale_dev@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production}
      - INTERNAL_AUTH_SECRET=${INTERNAL_AUTH_SECRET:-dev_internal_auth_secret}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CRM_SERVICE_URL=http://crm-service:3002
      - MESSAGING_SERVICE_URL=http://messaging-service:3003
      - AI_SERVICE_URL=http://ai-service:3005
      - USER_SERVICE_URL=http://user-service:3006
      - BD_ACCOUNTS_SERVICE_URL=http://bd-accounts-service:3007
      - PIPELINE_SERVICE_URL=http://pipeline-service:3008
      - AUTOMATION_SERVICE_URL=http://automation-service:3009
      - ANALYTICS_SERVICE_URL=http://analytics-service:3010
      - ACTIVITY_SERVICE_URL=http://activity-service:3013
      - TEAM_SERVICE_URL=http://team-service:3011
      - CAMPAIGN_SERVICE_URL=http://campaign-service:3012
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
      - nm_apigateway_root:/app/node_modules
      - nm_apigateway_svc:/app/services/api-gateway/node_modules
      - nm_shared_types:/app/shared/types/node_modules
      - nm_shared_utils:/app/shared/utils/node_modules
      - nm_shared_events:/app/shared/events/node_modules
      - nm_shared_logger:/app/shared/logger/node_modules
      - nm_shared_core:/app/shared/service-core/node_modules
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - getsale-network

  auth-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.dev
