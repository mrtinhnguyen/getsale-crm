    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    container_name: getsale-frontend
    ports:
      - "5173:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:3004
      - API_URL=http://api-gateway:8000
      - WS_URL=ws://websocket-service:3004
    volumes:
      - ./frontend:/app
      - nm_frontend_node_modules:/app/node_modules
      - nm_frontend_next:/app/.next
    depends_on:
      api-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - getsale-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  # Named volumes for dev node_modules/.next — reuse instead of anonymous (avoids hundreds of orphan volumes)
  nm_shared_types:
  nm_shared_utils:
  nm_shared_events:
  nm_shared_logger:
  nm_shared_core:
  nm_apigateway_root:
  nm_apigateway_svc:
  nm_auth_root:
  nm_auth_svc:
  nm_crm_root:
  nm_crm_svc:
  nm_messaging_root:
  nm_messaging_svc:
  nm_websocket_root:
  nm_websocket_svc:
  nm_ai_root:
  nm_ai_svc:
  nm_user_root:
  nm_user_svc:
  nm_bdaccounts_root:
  nm_bdaccounts_svc:
  nm_pipeline_root:
  nm_pipeline_svc:
  nm_automation_root:
  nm_automation_svc:
  nm_analytics_root:
  nm_analytics_svc:
  nm_activity_root:
  nm_activity_svc:
  nm_team_root:
  nm_team_svc:
  nm_campaign_root:
  nm_campaign_svc:
  nm_frontend_node_modules:
  nm_frontend_next:

networks:
  getsale-network:
    driver: bridge