global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']

  - job_name: 'crm-service'
    static_configs:
      - targets: ['crm-service:3002']

  - job_name: 'messaging-service'
    static_configs:
      - targets: ['messaging-service:3003']

  - job_name: 'websocket-service'
    static_configs:
      - targets: ['websocket-service:3004']

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:3005']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3006']

  - job_name: 'bd-accounts-service'
    static_configs:
      - targets: ['bd-accounts-service:3007']

  - job_name: 'pipeline-service'
    static_configs:
      - targets: ['pipeline-service:3008']

  - job_name: 'automation-service'
    static_configs:
      - targets: ['automation-service:3009']

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:3010']

  - job_name: 'team-service'
    static_configs:
      - targets: ['team-service:3011']

  - job_name: 'campaign-service'
    static_configs:
      - targets: ['campaign-service:3012']
